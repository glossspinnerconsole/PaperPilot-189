<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PaperPilot AI literature review agent</title>
  <desc id="desc">A polished hero illustration showing PaperPilot turning research questions into search, evidence, reports, PDFs, and an Obsidian wiki.</desc>
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="0.42" stop-color="#10233B"/>
      <stop offset="0.74" stop-color="#14362F"/>
      <stop offset="1" stop-color="#0B2A35"/>
    </linearGradient>
    <linearGradient id="panel" x1="62" y1="42" x2="1118" y2="388" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#102033" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#102A27" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="paper" x1="766" y1="74" x2="1042" y2="326" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DCEBFF"/>
    </linearGradient>
    <linearGradient id="blueGreen" x1="95" y1="344" x2="1085" y2="74" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.48" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="warm" x1="744" y1="272" x2="1020" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
    <clipPath id="panelClip">
      <rect x="42" y="34" width="1116" height="352" rx="30"/>
    </clipPath>
  </defs>

  <rect width="1200" height="420" rx="32" fill="url(#heroBg)"/>
  <g clip-path="url(#panelClip)">
    <rect x="42" y="34" width="1116" height="352" rx="30" fill="url(#panel)" stroke="#26435E"/>
    <path d="M-12 326C132 269 280 294 422 331C604 379 753 385 930 310C1052 258 1134 247 1215 266V420H-12V326Z" fill="#2DD4BF" opacity="0.10"/>
    <path d="M-20 94C136 120 244 99 372 68C530 29 676 33 842 86C994 134 1105 121 1220 84" stroke="#60A5FA" stroke-width="1.4" opacity="0.18"/>
    <path d="M88 362H1112" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <path d="M88 64H1112" stroke="#FFFFFF" stroke-opacity="0.08"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif">
    <text x="82" y="118" fill="#F8FAFC" font-size="58" font-weight="850" letter-spacing="0">PaperPilot</text>
    <text x="84" y="156" fill="#BAD5E5" font-size="21" font-weight="560">Research questions into evidence-grounded literature reviews.</text>
    <text x="84" y="184" fill="#8FB2C4" font-size="16" font-weight="520">Search sources, verify artifacts, synthesize findings, and export reports plus an Obsidian wiki.</text>
  </g>

  <g filter="url(#cardShadow)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif">
    <rect x="82" y="222" width="145" height="54" rx="13" fill="#0F2742" stroke="#2B5C83"/>
    <text x="106" y="244" fill="#E0F2FE" font-size="13" font-weight="750">Source registry</text>
    <text x="106" y="263" fill="#8FD3FF" font-size="12" font-weight="560">arXiv · PubMed · PMC</text>

    <rect x="249" y="222" width="145" height="54" rx="13" fill="#1B2146" stroke="#4A4C9A"/>
    <text x="273" y="244" fill="#EDE9FE" font-size="13" font-weight="750">Screening</text>
    <text x="273" y="263" fill="#C4B5FD" font-size="12" font-weight="560">core · adjacent · exclude</text>

    <rect x="416" y="222" width="145" height="54" rx="13" fill="#12332B" stroke="#2E7D5E"/>
    <text x="440" y="244" fill="#D1FAE5" font-size="13" font-weight="750">Evidence ledger</text>
    <text x="440" y="263" fill="#86EFAC" font-size="12" font-weight="560">claims with citations</text>
  </g>

  <g opacity="0.92">
    <path d="M226 249H249" stroke="#4C7C94" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M241 242L249 249L241 256" stroke="#4C7C94" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M394 249H416" stroke="#4C7C94" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M408 242L416 249L408 256" stroke="#4C7C94" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M562 249C625 249 636 192 694 192" stroke="#4C7C94" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6 8"/>
    <path d="M684 185L694 192L684 199" stroke="#4C7C94" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="696" y="62" width="330" height="288" rx="24" fill="#0B1628" stroke="#29445F"/>
    <rect x="724" y="92" width="244" height="204" rx="18" fill="url(#paper)"/>
    <path d="M724 111C760 130 801 133 848 123C899 113 925 124 968 148V92H724V111Z" fill="#E6F2FF"/>
    <path d="M760 150H918" stroke="#95A7BC" stroke-width="7" stroke-linecap="round"/>
    <path d="M760 178H934" stroke="#CBD5E1" stroke-width="7" stroke-linecap="round"/>
    <path d="M760 206H898" stroke="#CBD5E1" stroke-width="7" stroke-linecap="round"/>
    <path d="M760 234H936" stroke="#CBD5E1" stroke-width="7" stroke-linecap="round"/>
    <path d="M760 262H860" stroke="#CBD5E1" stroke-width="7" stroke-linecap="round"/>
    <path d="M963 87L1038 148L971 319L927 228L780 288L963 87Z" fill="url(#blueGreen)"/>
    <path d="M927 228L1038 148L971 319L927 228Z" fill="url(#warm)"/>
    <path d="M780 288L927 228L963 87L780 288Z" fill="#F8FAFC"/>
    <path d="M927 228L963 87L1038 148L927 228Z" fill="#CFFAFE"/>
    <circle cx="1008" cy="274" r="8" fill="#34D399"/>
    <circle cx="742" cy="322" r="7" fill="#FBBF24"/>
    <circle cx="1011" cy="111" r="5" fill="#A78BFA"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif" filter="url(#cardShadow)">
    <rect x="648" y="303" width="112" height="42" rx="12" fill="#13243B" stroke="#315270"/>
    <text x="671" y="329" fill="#E0F2FE" font-size="14" font-weight="760">Markdown</text>
    <rect x="777" y="303" width="90" height="42" rx="12" fill="#172044" stroke="#4A4C9A"/>
    <text x="806" y="329" fill="#EDE9FE" font-size="14" font-weight="760">HTML</text>
    <rect x="884" y="303" width="76" height="42" rx="12" fill="#183225" stroke="#2E7D5E"/>
    <text x="910" y="329" fill="#D1FAE5" font-size="14" font-weight="760">PDF</text>
    <rect x="977" y="303" width="116" height="42" rx="12" fill="#302313" stroke="#8A6432"/>
    <text x="1004" y="329" fill="#FEF3C7" font-size="14" font-weight="760">Obsidian</text>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif">
    <rect x="82" y="308" width="506" height="40" rx="20" fill="#071827" stroke="#27445C"/>
    <circle cx="111" cy="328" r="6" fill="#38BDF8"/>
    <text x="128" y="333" fill="#C7D2FE" font-size="14" font-weight="720">Intake</text>
    <circle cx="205" cy="328" r="6" fill="#818CF8"/>
    <text x="222" y="333" fill="#C7D2FE" font-size="14" font-weight="720">Protocol</text>
    <circle cx="326" cy="328" r="6" fill="#22C55E"/>
    <text x="343" y="333" fill="#C7D2FE" font-size="14" font-weight="720">Verify</text>
    <circle cx="420" cy="328" r="6" fill="#F59E0B"/>
    <text x="437" y="333" fill="#C7D2FE" font-size="14" font-weight="720">Synthesize</text>
  </g>
</svg>
